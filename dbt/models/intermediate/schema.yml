version: 2

models:
  - name: int_lga_name_conformed
    description: >
      Bridge resolving every distinct crash LGA name to an ABS LGA code, via a
      normalisation rule chain plus seed overrides. This model failing its
      lga_code not_null test is the designed alarm for new/changed source
      names — fact rows are never silently dropped.
    columns:
      - name: source_lga_name
        data_tests: [unique, not_null]
      - name: lga_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_abs__lga_codelist')
                field: lga_code
      - name: match_method
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [seed_override, exact_name, name_without_conjunction]
