# Local data platform: analytical warehouse + Airflow orchestration.
#
# Two separate Postgres instances on purpose:
#   - warehouse-db : the analytical database (raw -> staging -> marts). Exposed
#     on host port 5433 so Power BI / psql / dbt can connect without clashing
#     with any Postgres already running locally on 5432.
#   - airflow-db   : Airflow's internal metadata store. Never exposed; mixing
#     orchestration state with analytical data in one DB is a common anti-pattern.
#
# Airflow runs with LocalExecutor (single-machine parallelism, no Redis/Celery
# needed) using the standard init/webserver/scheduler service split from the
# official Airflow compose reference, slimmed down for local use.

x-airflow-common: &airflow-common
  build: ./airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow-db/${AIRFLOW_POSTGRES_DB:-airflow}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # Warehouse connection as seen from inside the Docker network. The
    # ingestion scripts and dbt profiles.yml both read these variables, so the
    # same code runs unchanged on the host (localhost:5433) and in Airflow.
    WAREHOUSE_POSTGRES_HOST: warehouse-db
    WAREHOUSE_POSTGRES_PORT: "5432"
    WAREHOUSE_POSTGRES_DB: ${WAREHOUSE_POSTGRES_DB:-sa_warehouse}
    WAREHOUSE_POSTGRES_USER: ${WAREHOUSE_POSTGRES_USER:-warehouse}
    WAREHOUSE_POSTGRES_PASSWORD: ${WAREHOUSE_POSTGRES_PASSWORD:-warehouse}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./ingestion:/opt/airflow/ingestion
    - ./dbt:/opt/airflow/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    airflow-db:
      condition: service_healthy
    warehouse-db:
      condition: service_healthy

services:
  warehouse-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${WAREHOUSE_POSTGRES_USER:-warehouse}
      POSTGRES_PASSWORD: ${WAREHOUSE_POSTGRES_PASSWORD:-warehouse}
      POSTGRES_DB: ${WAREHOUSE_POSTGRES_DB:-sa_warehouse}
    ports:
      - "${WAREHOUSE_POSTGRES_PORT:-5433}:5432"
    volumes:
      - warehouse-data:/var/lib/postgresql/data
      # Creates the `raw` schema on first boot (bronze landing zone).
      - ./docker/init-warehouse.sql:/docker-entrypoint-initdb.d/init-warehouse.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_POSTGRES_USER:-warehouse} -d ${WAREHOUSE_POSTGRES_DB:-sa_warehouse}"]
      interval: 5s
      retries: 10

  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_POSTGRES_USER:-airflow}"]
      interval: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate && airflow users create
      --username ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      --password ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
      --firstname Local --lastname Admin --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  warehouse-data:
  airflow-db-data:
